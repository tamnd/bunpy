name: release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  GO_VERSION: '1.26'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            bin: bunpy
            archive: tar.gz
          - goos: linux
            goarch: arm64
            bin: bunpy
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            bin: bunpy
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            bin: bunpy
            archive: tar.gz
          - goos: windows
            goarch: amd64
            bin: bunpy.exe
            archive: zip
          - goos: windows
            goarch: arm64
            bin: bunpy.exe
            archive: zip
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Resolve version label
        shell: bash
        run: echo "BUNPY_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build \
            -trimpath \
            -ldflags="$(bash scripts/build-ldflags.sh)" \
            -o "${{ matrix.bin }}" \
            ./cmd/bunpy

      - name: Build host binary for manpage staging
        if: matrix.goos != 'windows'
        shell: bash
        env:
          CGO_ENABLED: '0'
        run: |
          go build \
            -trimpath \
            -ldflags="$(bash scripts/build-ldflags.sh)" \
            -o bunpy-host \
            ./cmd/bunpy

      - name: Stage archive contents
        shell: bash
        run: |
          stage=bunpy-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          mkdir -p "$stage"
          cp "${{ matrix.bin }}" "$stage/"
          cp LICENSE README.md CHANGELOG.md "$stage/"
          if [ -x ./bunpy-host ]; then
            ./bunpy-host man --install "$stage/share/man" >/dev/null
          fi
          echo "STAGE=$stage" >> "$GITHUB_ENV"

      - name: Create tarball
        if: matrix.archive == 'tar.gz'
        run: |
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - name: Create zip
        if: matrix.archive == 'zip'
        run: |
          zip -r "${STAGE}.zip" "$STAGE"
          sha256sum "${STAGE}.zip" > "${STAGE}.zip.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: archive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            bunpy-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
            bunpy-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: archive-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Aggregate checksums
        run: |
          ( cd dist && cat *.sha256 ) > dist/SHA256SUMS
          ls -la dist/

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
          body_path: changelog/${{ github.ref_name }}.md
          fail_on_unmatched_files: true
          draft: false
          prerelease: false

      - uses: actions/upload-artifact@v7
        with:
          name: sha256sums
          path: dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 7

  tap:
    name: update homebrew tap
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.fork }}
    steps:
      - name: Skip if BREW_TAP_TOKEN missing
        id: gate
        env:
          TOKEN: ${{ secrets.BREW_TAP_TOKEN }}
        run: |
          if [ -z "${TOKEN:-}" ]; then
            echo "no BREW_TAP_TOKEN secret; skipping tap update"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.gate.outputs.skip != 'true'

      - uses: actions/download-artifact@v8
        if: steps.gate.outputs.skip != 'true'
        with:
          name: sha256sums
          path: sums

      - name: Render formula
        if: steps.gate.outputs.skip != 'true'
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p out
          bash scripts/render-formula.sh "$version" sums/SHA256SUMS out/bunpy.rb
          cat out/bunpy.rb

      - name: Push to homebrew-bunpy
        if: steps.gate.outputs.skip != 'true'
        env:
          BREW_TAP_TOKEN: ${{ secrets.BREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          tap="$(mktemp -d)/homebrew-bunpy"
          git clone --quiet "https://x-access-token:${BREW_TAP_TOKEN}@github.com/tamnd/homebrew-bunpy.git" "$tap"
          mkdir -p "$tap/Formula"
          cp out/bunpy.rb "$tap/Formula/bunpy.rb"
          cd "$tap"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/bunpy.rb; then
            echo "no formula changes; nothing to push"
            exit 0
          fi
          git add Formula/bunpy.rb
          git commit -m "bunpy ${version}"
          git push origin HEAD:main
