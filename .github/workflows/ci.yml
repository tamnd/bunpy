name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'

jobs:
  test:
    name: go test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Print tool versions
        run: go version

      - name: Sync sibling toolchain (gopapy, gocopy, goipy)
        shell: bash
        run: bash scripts/sync-deps.sh

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

      - name: end-to-end fixtures
        shell: bash
        run: bash tests/run.sh

  smoke:
    name: bunpy --version smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Sync sibling toolchain (gopapy, gocopy, goipy)
        run: bash scripts/sync-deps.sh

      - name: Build bunpy
        run: go build -o bunpy ./cmd/bunpy

      - name: bunpy --version
        run: ./bunpy --version

      - name: bunpy --help
        run: ./bunpy --help

      - name: bunpy hello.py
        run: |
          echo 'x = 1' > hello.py
          ./bunpy hello.py
