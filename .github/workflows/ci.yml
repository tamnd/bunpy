name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'

jobs:
  test:
    name: go test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Print tool versions
        run: go version

      - name: Sync sibling toolchain (gopapy, gocopy, goipy)
        shell: bash
        run: bash scripts/sync-deps.sh

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

      - name: stdlib index in sync with goipy
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tmp="$(mktemp)"
          bash scripts/sync-stdlib-index.sh "$tmp"
          if ! diff -u runtime/stdlib_index.go "$tmp"; then
            echo "runtime/stdlib_index.go is stale; run scripts/sync-stdlib-index.sh and commit." >&2
            exit 1
          fi

      - name: render-formula smoke
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/test-render-formula.sh

      - name: install.sh smoke
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/test-install-sh.sh

      - name: end-to-end fixtures
        shell: bash
        run: bash tests/run.sh

  smoke:
    name: bunpy --version smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Sync sibling toolchain (gopapy, gocopy, goipy)
        run: bash scripts/sync-deps.sh

      - name: Build bunpy with metadata
        env:
          BUNPY_VERSION: dev
        run: |
          go build \
            -trimpath \
            -ldflags="$(bash scripts/build-ldflags.sh)" \
            -o bunpy \
            ./cmd/bunpy

      - name: bunpy --version
        run: ./bunpy --version

      - name: bunpy version --short
        run: |
          got="$(./bunpy version --short)"
          test "$got" = "dev" || { echo "want dev, got $got"; exit 1; }

      - name: bunpy version --json shape
        run: |
          out="$(./bunpy version --json)"
          echo "$out"
          python3 -c "import json,sys; d=json.loads(sys.argv[1]); assert d['version']=='dev', d; assert d['commit'], d; assert d['build_date'], d; assert d['goipy'] and d['gocopy'] and d['gopapy'], d; assert 'go' in d and 'os' in d and 'arch' in d, d" "$out"

      - name: bunpy --help
        run: ./bunpy --help

      - name: bunpy help / --help parity
        shell: bash
        run: |
          for cmd in run repl stdlib version help man pm add install outdated update remove link unlink patch why workspace audit publish; do
            a="$(./bunpy help "$cmd")"
            b="$(./bunpy "$cmd" --help)"
            if [ "$a" != "$b" ]; then
              echo "help drift for $cmd"
              diff <(printf '%s' "$a") <(printf '%s' "$b") || true
              exit 1
            fi
          done

      - name: bunpy man render
        shell: bash
        run: |
          out="$(./bunpy man run)"
          case "$out" in
            .TH*) ;;
            *) echo "expected .TH header, got: ${out%%$'\n'*}"; exit 1 ;;
          esac

      - name: bunpy man --install smoke
        shell: bash
        run: |
          dest="$(mktemp -d)/share/man"
          ./bunpy man --install "$dest"
          test -f "$dest/man1/bunpy.1"
          test -f "$dest/man1/bunpy-run.1"
          test -f "$dest/man1/bunpy-repl.1"

      - name: bunpy repl piped smoke
        shell: bash
        run: |
          out="$(printf 'x = 1\n\n:quit\n' | ./bunpy repl --quiet 2>&1)"
          if [ -n "$out" ]; then
            echo "expected empty output, got: $out"; exit 1
          fi
          banner="$(printf ':quit\n' | ./bunpy repl 2>&1)"
          case "$banner" in
            *bunpy*repl*) ;;
            *) echo "expected banner, got: $banner"; exit 1 ;;
          esac

      - name: bunpy pm config smoke
        shell: bash
        run: |
          dir="$(mktemp -d)"
          cat > "$dir/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"

          [tool.bunpy]
          profile = "fast"
          EOF
          out="$(./bunpy pm config "$dir/pyproject.toml")"
          echo "$out"
          case "$out" in
            *smoke*0.0.1*) ;;
            *) echo "want smoke + 0.0.1, got: $out"; exit 1 ;;
          esac
          case "$out" in
            *fast*) ;;
            *) echo "want tool.bunpy.profile=fast, got: $out"; exit 1 ;;
          esac
          if ./bunpy pm config /no/such/path/pyproject.toml 2>/dev/null; then
            echo "want non-zero exit on missing file"; exit 1
          fi

      - name: bunpy pm info smoke
        shell: bash
        run: |
          fix="$(mktemp -d)/fixtures"
          mkdir -p "$fix/pypi.org/simple/demo"
          cat > "$fix/pypi.org/simple/demo/index.json" <<'EOF'
          {"name":"demo","files":[{"filename":"demo-1.0-py3-none-any.whl","url":"https://x/demo-1.0-py3-none-any.whl","hashes":{"sha256":"abc"}}],"meta":{"api-version":"1.1"}}
          EOF
          out="$(BUNPY_PYPI_FIXTURES="$fix" BUNPY_CACHE_DIR="$(mktemp -d)" ./bunpy pm info demo)"
          echo "$out"
          case "$out" in
            *demo*1.0*wheel*) ;;
            *) echo "want demo + 1.0 + wheel, got: $out"; exit 1 ;;
          esac
          if BUNPY_PYPI_FIXTURES="$fix" BUNPY_CACHE_DIR="$(mktemp -d)" ./bunpy pm info nopkg-xyzzy 2>/dev/null; then
            echo "want non-zero exit on 404"; exit 1
          fi

      - name: bunpy pm install-wheel smoke
        shell: bash
        run: |
          target="$(mktemp -d)/site-packages"
          ./bunpy pm install-wheel tests/fixtures/v012/tinypkg-0.1.0-py3-none-any.whl --target "$target"
          test -f "$target/tinypkg/__init__.py"
          got="$(cat "$target/tinypkg-0.1.0.dist-info/INSTALLER")"
          test "$got" = "bunpy" || { echo "want INSTALLER=bunpy, got: $got"; exit 1; }
          # URL fetch path through the fixture transport.
          target2="$(mktemp -d)/site-packages"
          BUNPY_PYPI_FIXTURES=tests/fixtures/v012/index BUNPY_CACHE_DIR="$(mktemp -d)" \
            ./bunpy pm install-wheel \
              https://files.example/tinypkg/tinypkg-0.1.0-py3-none-any.whl \
              --target "$target2"
          test -f "$target2/tinypkg/__init__.py"

      - name: bunpy add smoke
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" add widget )
          test -f "$work/.bunpy/site-packages/widget/__init__.py"
          grep -q 'widget>=1.1.0' "$work/pyproject.toml" || { echo "missing widget>=1.1.0 in:"; cat "$work/pyproject.toml"; exit 1; }
          # --no-install path: only writes pyproject.
          work2="$(mktemp -d)"
          cache2="$(mktemp -d)"
          cat > "$work2/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          EOF
          ( cd "$work2" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache2" "$GITHUB_WORKSPACE/bunpy" add widget==1.0.0 --no-install )
          grep -q 'widget==1.0.0' "$work2/pyproject.toml"
          test ! -d "$work2/.bunpy/site-packages"

      - name: bunpy pm lock smoke
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          dependencies = ["widget>=1.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          test -f "$work/bunpy.lock"
          grep -q 'name = "widget"' "$work/bunpy.lock"
          grep -q 'version = "1.1.0"' "$work/bunpy.lock"
          grep -q 'content-hash = "sha256:' "$work/bunpy.lock"
          # --check on a clean state passes.
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock --check )
          # Mutate pyproject and assert --check exits non-zero.
          sed -i.bak 's/widget>=1.0/widget>=2.0/' "$work/pyproject.toml"
          if ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock --check 2>/dev/null ); then
            echo "want non-zero exit on drift"; exit 1
          fi

      - name: bunpy pm lock transitive smoke (v0.1.5)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          dependencies = ["widget>=1.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v015/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          test -f "$work/bunpy.lock"
          grep -q 'name = "widget"' "$work/bunpy.lock" || { echo "missing widget pin in:"; cat "$work/bunpy.lock"; exit 1; }
          grep -q 'name = "gizmo"' "$work/bunpy.lock" || { echo "missing transitive gizmo pin in:"; cat "$work/bunpy.lock"; exit 1; }
          grep -q 'version = "1.0.0"' "$work/bunpy.lock"
          grep -q 'version = "2.0.0"' "$work/bunpy.lock"
          # --check on the freshly resolved tree passes.
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v015/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock --check )

      - name: bunpy install smoke (v0.1.5)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          dependencies = ["widget>=1.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v015/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v015/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" install )
          test -f "$work/.bunpy/site-packages/widget/__init__.py"
          test -f "$work/.bunpy/site-packages/gizmo/__init__.py"

      - name: bunpy lane smoke - dev (v0.1.6)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"

          [dependency-groups]
          dev = ["widget>=1.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          grep -q 'lanes = \["dev"\]' "$work/bunpy.lock"
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" install )
          test ! -e "$work/.bunpy/site-packages/widget"
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" install -D )
          test -f "$work/.bunpy/site-packages/widget/__init__.py"

      - name: bunpy lane smoke - optional extras (v0.1.6)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"

          [project.optional-dependencies]
          web = ["widget>=1.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          grep -q 'lanes = \["optional:web"\]' "$work/bunpy.lock"
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" install --all-extras )
          test -f "$work/.bunpy/site-packages/widget/__init__.py"

      - name: bunpy lane smoke - peer (v0.1.6)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"

          [tool.bunpy]
          peer-dependencies = ["widget>=1.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          grep -q 'lanes = \["peer"\]' "$work/bunpy.lock"
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" install -P )
          test -f "$work/.bunpy/site-packages/widget/__init__.py"

      - name: bunpy outdated smoke (v0.1.7)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          dependencies = ["widget>=1.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          # Pin the lockfile back to 1.0.0 so widget is `outdated` (1.1.0 is on the index).
          sed -i.bak \
            -e 's/version = "1.1.0"/version = "1.0.0"/' \
            -e 's/widget-1.1.0-py3-none-any.whl/widget-1.0.0-py3-none-any.whl/' \
            -e 's|sha256:5b9866d1a5e11d85e37f88de9a941f9349ed18f4cd46508b12b1603d2ad63e2b|sha256:86eaa2517187b884e706a792085ed6dabd2530e6f37d0d9220d08b5448c8a796|' \
            "$work/bunpy.lock"
          out="$( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" outdated )"
          echo "$out"
          case "$out" in
            *widget*1.0.0*1.1.0*) ;;
            *) echo "want widget 1.0.0 -> 1.1.0 row, got: $out"; exit 1 ;;
          esac
          jsonout="$( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" outdated --json )"
          echo "$jsonout"
          python3 -c "import json,sys; d=json.loads(sys.argv[1]); rows=d['outdated']; assert len(rows)==1, rows; r=rows[0]; assert r['name']=='widget' and r['current']=='1.0.0' and r['wanted']=='1.1.0' and r['latest']=='1.1.0', r" "$jsonout"

      - name: bunpy update smoke (v0.1.7)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          dependencies = ["widget>=1.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          # Drop widget back to 1.0.0 so update has something to lift.
          sed -i.bak \
            -e 's/version = "1.1.0"/version = "1.0.0"/' \
            -e 's/widget-1.1.0-py3-none-any.whl/widget-1.0.0-py3-none-any.whl/' \
            -e 's|sha256:5b9866d1a5e11d85e37f88de9a941f9349ed18f4cd46508b12b1603d2ad63e2b|sha256:86eaa2517187b884e706a792085ed6dabd2530e6f37d0d9220d08b5448c8a796|' \
            "$work/bunpy.lock"
          out="$( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" update --no-install )"
          echo "$out"
          case "$out" in
            *"widget 1.0.0 -> 1.1.0"*) ;;
            *) echo "want widget upgrade line, got: $out"; exit 1 ;;
          esac
          grep -q 'version = "1.1.0"' "$work/bunpy.lock"

      - name: bunpy update --latest smoke (v0.1.7)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          # Pin spec to ==1.0.0; bare update must respect it. --latest widget
          # strips the spec and lifts the pin to 1.1.0.
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          dependencies = ["widget==1.0.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          grep -q 'version = "1.0.0"' "$work/bunpy.lock"
          bare="$( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" update --no-install )"
          case "$bare" in
            *"no changes"*) ;;
            *) echo "want no-changes line for ==1.0.0 spec, got: $bare"; exit 1 ;;
          esac
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" update --latest widget --no-install )
          grep -q 'version = "1.1.0"' "$work/bunpy.lock"
          # --latest with no positional must error out.
          if ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" update --latest --no-install 2>/dev/null ); then
            echo "want non-zero exit on --latest with no pkg"; exit 1
          fi

      - name: bunpy remove smoke (v0.1.8)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          dependencies = ["widget>=1.0"]

          [dependency-groups]
          dev = ["widget>=1.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" install -D )
          test -f "$work/.bunpy/site-packages/widget/__init__.py"
          out="$( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" remove widget )"
          echo "$out"
          case "$out" in
            *"removed 2 packages"*) ;;
            *) echo "want removed-2 summary, got: $out"; exit 1 ;;
          esac
          if grep -q widget "$work/pyproject.toml"; then
            echo "widget still in pyproject after bare remove:"; cat "$work/pyproject.toml"; exit 1
          fi
          if grep -q 'name = "widget"' "$work/bunpy.lock"; then
            echo "widget still pinned after remove:"; cat "$work/bunpy.lock"; exit 1
          fi
          test ! -e "$work/.bunpy/site-packages/widget"
          # -D restricts to the dev lane only.
          work2="$(mktemp -d)"
          cat > "$work2/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          dependencies = ["widget>=1.0"]

          [dependency-groups]
          dev = ["widget>=1.0"]
          EOF
          ( cd "$work2" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          ( cd "$work2" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" remove -D widget --no-install )
          grep -q 'dependencies = \["widget>=1.0"\]' "$work2/pyproject.toml"
          # --latest is owned by update; -D plus -P is rejected.
          if ( cd "$work2" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" remove -D -P widget --no-install 2>/dev/null ); then
            echo "want non-zero exit on -D + -P"; exit 1
          fi

      - name: bunpy link smoke (v0.1.9)
        shell: bash
        run: |
          export BUNPY_LINK_DIR="$(mktemp -d)"
          src="$(mktemp -d)"
          cat > "$src/pyproject.toml" <<'EOF'
          [project]
          name = "widget"
          version = "9.9.9"
          EOF
          mkdir -p "$src/widget"
          echo "VERSION = '9.9.9'" > "$src/widget/__init__.py"
          ( cd "$src" && "$GITHUB_WORKSPACE/bunpy" link )
          test -f "$BUNPY_LINK_DIR/widget.json"
          consumer="$(mktemp -d)"
          cat > "$consumer/pyproject.toml" <<'EOF'
          [project]
          name = "demo"
          version = "0.0.1"
          EOF
          ( cd "$consumer" && "$GITHUB_WORKSPACE/bunpy" link widget )
          test -f "$consumer/.bunpy/site-packages/widget.pth"
          got="$(cat "$consumer/.bunpy/site-packages/widget.pth")"
          want="$(cd "$src" && pwd -P)"
          test "$got" = "$want" || { echo "want $want, got $got"; exit 1; }
          test -f "$consumer/.bunpy/site-packages/widget-9.9.9.dist-info/INSTALLER"
          installer="$(cat "$consumer/.bunpy/site-packages/widget-9.9.9.dist-info/INSTALLER")"
          test "$installer" = "bunpy-link" || { echo "want bunpy-link, got $installer"; exit 1; }
          # --list shows the entry.
          listed="$("$GITHUB_WORKSPACE/bunpy" link --list)"
          case "$listed" in
            *widget*9.9.9*) ;;
            *) echo "want widget+9.9.9 in --list, got: $listed"; exit 1 ;;
          esac
          # Unlink consumer-side, then unregister.
          ( cd "$consumer" && "$GITHUB_WORKSPACE/bunpy" unlink widget )
          test ! -e "$consumer/.bunpy/site-packages/widget.pth"
          test ! -e "$consumer/.bunpy/site-packages/widget-9.9.9.dist-info"
          ( cd "$src" && "$GITHUB_WORKSPACE/bunpy" unlink )
          test ! -e "$BUNPY_LINK_DIR/widget.json"

      - name: bunpy patch smoke (v0.1.10)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          # Pre-stage the wheel cache so the open path stays offline.
          mkdir -p "$cache/wheels/widget"
          cp "$GITHUB_WORKSPACE/tests/fixtures/v013/widget-1.0.0-py3-none-any.whl" \
             "$cache/wheels/widget/widget-1.0.0-py3-none-any.whl"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "demo"
          version = "0.1.0"
          dependencies = ["widget>=1.0"]
          EOF
          cat > "$work/bunpy.lock" <<'EOF'
          # bunpy.lock
          version = 1
          generated = "2026-04-27T10:00:00Z"
          content-hash = "sha256:0000"

          [[package]]
          name = "widget"
          version = "1.0.0"
          filename = "widget-1.0.0-py3-none-any.whl"
          url = "https://files.example.com/widget-1.0.0-py3-none-any.whl"
          hash = "sha256:abcd"
          EOF
          ( cd "$work" && "$GITHUB_WORKSPACE/bunpy" patch widget --cache-dir "$cache" )
          test -d "$work/.bunpy/patches/.scratch/widget-1.0.0"
          test -f "$work/.bunpy/patches/.pristine/widget-1.0.0/widget/__init__.py"
          # Edit the scratch.
          init="$work/.bunpy/patches/.scratch/widget-1.0.0/widget/__init__.py"
          printf 'PATCHED = True\n' >> "$init"
          ( cd "$work" && "$GITHUB_WORKSPACE/bunpy" patch --commit widget )
          test -f "$work/patches/widget+1.0.0.patch"
          grep -q 'PATCHED = True' "$work/patches/widget+1.0.0.patch"
          grep -q '\[tool.bunpy.patches\]' "$work/pyproject.toml"
          grep -q '"widget@1.0.0"' "$work/pyproject.toml"
          test ! -d "$work/.bunpy/patches/.scratch/widget-1.0.0"
          # bunpy install applies the patch on top of the wheel.
          ( cd "$work" && "$GITHUB_WORKSPACE/bunpy" install --target "$work/site-packages" --cache-dir "$cache" --no-verify )
          grep -q 'PATCHED = True' "$work/site-packages/widget/__init__.py"
          test "$(cat "$work/site-packages/widget-1.0.0.dist-info/INSTALLER")" = "bunpy-patch"

      - name: bunpy why smoke (v0.1.11)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          # Synthesise three METADATA-bearing wheels so the
          # Requires-Dist scan in `bunpy why` runs against real
          # bytes.
          mkdir -p "$cache/wheels/alpha" "$cache/wheels/beta" "$cache/wheels/gamma"
          python3 - "$cache" <<'PY'
          import sys, zipfile
          cache = sys.argv[1]
          rows = [
              ("alpha", "1.0.0", "Requires-Dist: gamma>=2.0\n"),
              ("beta", "1.0.0", "Requires-Dist: gamma>=2.1\n"),
              ("gamma", "2.2.3", ""),
          ]
          for n, v, r in rows:
              path = f"{cache}/wheels/{n}/{n}-{v}-py3-none-any.whl"
              with zipfile.ZipFile(path, "w") as z:
                  z.writestr(f"{n}-{v}.dist-info/METADATA",
                             f"Metadata-Version: 2.1\nName: {n}\nVersion: {v}\n{r}")
          PY
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "demo"
          version = "0.1.0"
          dependencies = ["alpha>=1.0"]

          [project.optional-dependencies]
          tracing = ["beta>=1.0"]
          EOF
          cat > "$work/bunpy.lock" <<'EOF'
          # bunpy.lock
          version = 1
          generated = "2026-04-27T10:00:00Z"
          content-hash = "sha256:0000"

          [[package]]
          name = "alpha"
          version = "1.0.0"
          filename = "alpha-1.0.0-py3-none-any.whl"
          url = "https://files.example.com/alpha-1.0.0-py3-none-any.whl"
          hash = "sha256:aaaa"

          [[package]]
          name = "beta"
          version = "1.0.0"
          filename = "beta-1.0.0-py3-none-any.whl"
          url = "https://files.example.com/beta-1.0.0-py3-none-any.whl"
          hash = "sha256:bbbb"
          lanes = ["optional:tracing"]

          [[package]]
          name = "gamma"
          version = "2.2.3"
          filename = "gamma-2.2.3-py3-none-any.whl"
          url = "https://files.example.com/gamma-2.2.3-py3-none-any.whl"
          hash = "sha256:cccc"
          EOF
          out="$( cd "$work" && "$GITHUB_WORKSPACE/bunpy" why gamma --cache-dir "$cache" )"
          echo "$out" | grep -q 'gamma 2.2.3'
          echo "$out" | grep -q 'via alpha 1.0.0'
          echo "$out" | grep -q 'via beta 1.0.0'
          echo "$out" | grep -q 'project requirement (main)'
          echo "$out" | grep -q 'project requirement (optional:tracing)'
          top="$( cd "$work" && "$GITHUB_WORKSPACE/bunpy" why gamma --top --cache-dir "$cache" )"
          test "$top" = "$(printf 'alpha\nbeta')"
          ( cd "$work" && "$GITHUB_WORKSPACE/bunpy" why ghost --cache-dir "$cache" ) && exit 1 || true

      - name: bunpy publish smoke (v0.2.2)
        shell: bash
        run: |
          # Smoke: --dry-run exits 0 and --no-token check
          dir="$(mktemp -d)"
          cat > "$dir/pyproject.toml" <<'EOF'
          [project]
          name = "mypkg"
          version = "0.1.0"
          EOF
          # Without token and without dry-run, should exit non-zero
          ( cd "$dir" && "$GITHUB_WORKSPACE/bunpy" publish ) && exit 1 || true
          # --help exits 0
          "$GITHUB_WORKSPACE/bunpy" publish --help > /dev/null
          # unknown flag exits non-zero
          ( cd "$dir" && "$GITHUB_WORKSPACE/bunpy" publish --unknown-flag ) && exit 1 || true

      - name: bunpy audit smoke (v0.2.1)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cat > "$work/bunpy.lock" <<'EOF'
          # bunpy.lock
          version = 1
          generated = "2026-04-27T10:00:00Z"
          content-hash = "sha256:0000"

          [[package]]
          name = "requests"
          version = "2.31.0"
          filename = "requests-2.31.0-py3-none-any.whl"
          url = "https://files.example.com/requests-2.31.0-py3-none-any.whl"
          hash = "sha256:aaaa"
          EOF
          # --json on a minimal lock should exit 0 and output valid JSON.
          # (No real OSV call: the integration is covered by pkg/audit tests.)
          # We only smoke-test flag parsing and JSON shape here.
          out="$( cd "$work" && "$GITHUB_WORKSPACE/bunpy" audit --json --lockfile bunpy.lock 2>&1 || true )"
          # Either [] (no vulns) or a JSON array are both valid; just check it starts with [ or is an error.
          echo "$out" | grep -qE '^\[|\{|No vulnerabilities' || { echo "unexpected audit output: $out"; exit 1; }
          # --help should exit 0
          "$GITHUB_WORKSPACE/bunpy" audit --help > /dev/null
          # unknown flag should exit 2
          ( cd "$work" && "$GITHUB_WORKSPACE/bunpy" audit --unknown-flag ) && exit 1 || true

      - name: bunpy workspace smoke (v0.2.0)
        shell: bash
        run: |
          ws="$(mktemp -d)"
          mkdir -p "$ws/pkgs/alpha" "$ws/pkgs/beta"
          cat > "$ws/pyproject.toml" <<'EOF'
          [project]
          name = "root"
          version = "0.1.0"

          [tool.bunpy.workspace]
          members = ["pkgs/alpha", "pkgs/beta"]
          EOF
          cat > "$ws/pkgs/alpha/pyproject.toml" <<'EOF'
          [project]
          name = "alpha"
          version = "0.1.0"
          dependencies = ["requests>=2.0"]
          EOF
          cat > "$ws/pkgs/beta/pyproject.toml" <<'EOF'
          [project]
          name = "beta"
          version = "0.1.0"
          dependencies = ["flask>=3.0"]
          EOF
          # --list from root
          out="$( "$GITHUB_WORKSPACE/bunpy" workspace --list --workspace "$ws" )"
          echo "$out" | grep -q 'alpha'
          echo "$out" | grep -q 'beta'
          # --list auto-detected from inside member dir
          out2="$( cd "$ws/pkgs/alpha" && "$GITHUB_WORKSPACE/bunpy" workspace --list )"
          echo "$out2" | grep -q 'alpha'
          echo "$out2" | grep -q 'beta'
          # unknown workspace root should error
          ( "$GITHUB_WORKSPACE/bunpy" workspace --list --workspace /tmp ) && exit 1 || true

      - name: bunpy hello.py
        run: |
          echo 'x = 1' > hello.py
          ./bunpy hello.py
