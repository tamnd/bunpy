name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'

jobs:
  test:
    name: go test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Print tool versions
        run: go version

      - name: Sync sibling toolchain (gopapy, gocopy, goipy)
        shell: bash
        run: bash scripts/sync-deps.sh

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

      - name: stdlib index in sync with goipy
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tmp="$(mktemp)"
          bash scripts/sync-stdlib-index.sh "$tmp"
          if ! diff -u runtime/stdlib_index.go "$tmp"; then
            echo "runtime/stdlib_index.go is stale; run scripts/sync-stdlib-index.sh and commit." >&2
            exit 1
          fi

      - name: render-formula smoke
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/test-render-formula.sh

      - name: install.sh smoke
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/test-install-sh.sh

      - name: end-to-end fixtures
        shell: bash
        run: bash tests/run.sh

  smoke:
    name: bunpy --version smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Sync sibling toolchain (gopapy, gocopy, goipy)
        run: bash scripts/sync-deps.sh

      - name: Build bunpy with metadata
        env:
          BUNPY_VERSION: dev
        run: |
          go build \
            -trimpath \
            -ldflags="$(bash scripts/build-ldflags.sh)" \
            -o bunpy \
            ./cmd/bunpy

      - name: bunpy --version
        run: ./bunpy --version

      - name: bunpy version --short
        run: |
          got="$(./bunpy version --short)"
          test "$got" = "dev" || { echo "want dev, got $got"; exit 1; }

      - name: bunpy version --json shape
        run: |
          out="$(./bunpy version --json)"
          echo "$out"
          python3 -c "import json,sys; d=json.loads(sys.argv[1]); assert d['version']=='dev', d; assert d['commit'], d; assert d['build_date'], d; assert d['goipy'] and d['gocopy'] and d['gopapy'], d; assert 'go' in d and 'os' in d and 'arch' in d, d" "$out"

      - name: bunpy --help
        run: ./bunpy --help

      - name: bunpy help / --help parity
        shell: bash
        run: |
          for cmd in run repl stdlib version help man pm add install outdated update; do
            a="$(./bunpy help "$cmd")"
            b="$(./bunpy "$cmd" --help)"
            if [ "$a" != "$b" ]; then
              echo "help drift for $cmd"
              diff <(printf '%s' "$a") <(printf '%s' "$b") || true
              exit 1
            fi
          done

      - name: bunpy man render
        shell: bash
        run: |
          out="$(./bunpy man run)"
          case "$out" in
            .TH*) ;;
            *) echo "expected .TH header, got: ${out%%$'\n'*}"; exit 1 ;;
          esac

      - name: bunpy man --install smoke
        shell: bash
        run: |
          dest="$(mktemp -d)/share/man"
          ./bunpy man --install "$dest"
          test -f "$dest/man1/bunpy.1"
          test -f "$dest/man1/bunpy-run.1"
          test -f "$dest/man1/bunpy-repl.1"

      - name: bunpy repl piped smoke
        shell: bash
        run: |
          out="$(printf 'x = 1\n\n:quit\n' | ./bunpy repl --quiet 2>&1)"
          if [ -n "$out" ]; then
            echo "expected empty output, got: $out"; exit 1
          fi
          banner="$(printf ':quit\n' | ./bunpy repl 2>&1)"
          case "$banner" in
            *bunpy*repl*) ;;
            *) echo "expected banner, got: $banner"; exit 1 ;;
          esac

      - name: bunpy pm config smoke
        shell: bash
        run: |
          dir="$(mktemp -d)"
          cat > "$dir/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"

          [tool.bunpy]
          profile = "fast"
          EOF
          out="$(./bunpy pm config "$dir/pyproject.toml")"
          echo "$out"
          case "$out" in
            *smoke*0.0.1*) ;;
            *) echo "want smoke + 0.0.1, got: $out"; exit 1 ;;
          esac
          case "$out" in
            *fast*) ;;
            *) echo "want tool.bunpy.profile=fast, got: $out"; exit 1 ;;
          esac
          if ./bunpy pm config /no/such/path/pyproject.toml 2>/dev/null; then
            echo "want non-zero exit on missing file"; exit 1
          fi

      - name: bunpy pm info smoke
        shell: bash
        run: |
          fix="$(mktemp -d)/fixtures"
          mkdir -p "$fix/pypi.org/simple/demo"
          cat > "$fix/pypi.org/simple/demo/index.json" <<'EOF'
          {"name":"demo","files":[{"filename":"demo-1.0-py3-none-any.whl","url":"https://x/demo-1.0-py3-none-any.whl","hashes":{"sha256":"abc"}}],"meta":{"api-version":"1.1"}}
          EOF
          out="$(BUNPY_PYPI_FIXTURES="$fix" BUNPY_CACHE_DIR="$(mktemp -d)" ./bunpy pm info demo)"
          echo "$out"
          case "$out" in
            *demo*1.0*wheel*) ;;
            *) echo "want demo + 1.0 + wheel, got: $out"; exit 1 ;;
          esac
          if BUNPY_PYPI_FIXTURES="$fix" BUNPY_CACHE_DIR="$(mktemp -d)" ./bunpy pm info nopkg-xyzzy 2>/dev/null; then
            echo "want non-zero exit on 404"; exit 1
          fi

      - name: bunpy pm install-wheel smoke
        shell: bash
        run: |
          target="$(mktemp -d)/site-packages"
          ./bunpy pm install-wheel tests/fixtures/v012/tinypkg-0.1.0-py3-none-any.whl --target "$target"
          test -f "$target/tinypkg/__init__.py"
          got="$(cat "$target/tinypkg-0.1.0.dist-info/INSTALLER")"
          test "$got" = "bunpy" || { echo "want INSTALLER=bunpy, got: $got"; exit 1; }
          # URL fetch path through the fixture transport.
          target2="$(mktemp -d)/site-packages"
          BUNPY_PYPI_FIXTURES=tests/fixtures/v012/index BUNPY_CACHE_DIR="$(mktemp -d)" \
            ./bunpy pm install-wheel \
              https://files.example/tinypkg/tinypkg-0.1.0-py3-none-any.whl \
              --target "$target2"
          test -f "$target2/tinypkg/__init__.py"

      - name: bunpy add smoke
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" add widget )
          test -f "$work/.bunpy/site-packages/widget/__init__.py"
          grep -q 'widget>=1.1.0' "$work/pyproject.toml" || { echo "missing widget>=1.1.0 in:"; cat "$work/pyproject.toml"; exit 1; }
          # --no-install path: only writes pyproject.
          work2="$(mktemp -d)"
          cache2="$(mktemp -d)"
          cat > "$work2/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          EOF
          ( cd "$work2" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache2" "$GITHUB_WORKSPACE/bunpy" add widget==1.0.0 --no-install )
          grep -q 'widget==1.0.0' "$work2/pyproject.toml"
          test ! -d "$work2/.bunpy/site-packages"

      - name: bunpy pm lock smoke
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          dependencies = ["widget>=1.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          test -f "$work/bunpy.lock"
          grep -q 'name = "widget"' "$work/bunpy.lock"
          grep -q 'version = "1.1.0"' "$work/bunpy.lock"
          grep -q 'content-hash = "sha256:' "$work/bunpy.lock"
          # --check on a clean state passes.
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock --check )
          # Mutate pyproject and assert --check exits non-zero.
          sed -i.bak 's/widget>=1.0/widget>=2.0/' "$work/pyproject.toml"
          if ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock --check 2>/dev/null ); then
            echo "want non-zero exit on drift"; exit 1
          fi

      - name: bunpy pm lock transitive smoke (v0.1.5)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          dependencies = ["widget>=1.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v015/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          test -f "$work/bunpy.lock"
          grep -q 'name = "widget"' "$work/bunpy.lock" || { echo "missing widget pin in:"; cat "$work/bunpy.lock"; exit 1; }
          grep -q 'name = "gizmo"' "$work/bunpy.lock" || { echo "missing transitive gizmo pin in:"; cat "$work/bunpy.lock"; exit 1; }
          grep -q 'version = "1.0.0"' "$work/bunpy.lock"
          grep -q 'version = "2.0.0"' "$work/bunpy.lock"
          # --check on the freshly resolved tree passes.
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v015/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock --check )

      - name: bunpy install smoke (v0.1.5)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          dependencies = ["widget>=1.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v015/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v015/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" install )
          test -f "$work/.bunpy/site-packages/widget/__init__.py"
          test -f "$work/.bunpy/site-packages/gizmo/__init__.py"

      - name: bunpy lane smoke - dev (v0.1.6)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"

          [dependency-groups]
          dev = ["widget>=1.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          grep -q 'lanes = \["dev"\]' "$work/bunpy.lock"
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" install )
          test ! -e "$work/.bunpy/site-packages/widget"
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" install -D )
          test -f "$work/.bunpy/site-packages/widget/__init__.py"

      - name: bunpy lane smoke - optional extras (v0.1.6)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"

          [project.optional-dependencies]
          web = ["widget>=1.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          grep -q 'lanes = \["optional:web"\]' "$work/bunpy.lock"
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" install --all-extras )
          test -f "$work/.bunpy/site-packages/widget/__init__.py"

      - name: bunpy lane smoke - peer (v0.1.6)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"

          [tool.bunpy]
          peer-dependencies = ["widget>=1.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          grep -q 'lanes = \["peer"\]' "$work/bunpy.lock"
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" install -P )
          test -f "$work/.bunpy/site-packages/widget/__init__.py"

      - name: bunpy outdated smoke (v0.1.7)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          dependencies = ["widget>=1.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          # Pin the lockfile back to 1.0.0 so widget is `outdated` (1.1.0 is on the index).
          sed -i.bak \
            -e 's/version = "1.1.0"/version = "1.0.0"/' \
            -e 's/widget-1.1.0-py3-none-any.whl/widget-1.0.0-py3-none-any.whl/' \
            -e 's|sha256:5b9866d1a5e11d85e37f88de9a941f9349ed18f4cd46508b12b1603d2ad63e2b|sha256:86eaa2517187b884e706a792085ed6dabd2530e6f37d0d9220d08b5448c8a796|' \
            "$work/bunpy.lock"
          out="$( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" outdated )"
          echo "$out"
          case "$out" in
            *widget*1.0.0*1.1.0*) ;;
            *) echo "want widget 1.0.0 -> 1.1.0 row, got: $out"; exit 1 ;;
          esac
          jsonout="$( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" outdated --json )"
          echo "$jsonout"
          python3 -c "import json,sys; d=json.loads(sys.argv[1]); rows=d['outdated']; assert len(rows)==1, rows; r=rows[0]; assert r['name']=='widget' and r['current']=='1.0.0' and r['wanted']=='1.1.0' and r['latest']=='1.1.0', r" "$jsonout"

      - name: bunpy update smoke (v0.1.7)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          dependencies = ["widget>=1.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          # Drop widget back to 1.0.0 so update has something to lift.
          sed -i.bak \
            -e 's/version = "1.1.0"/version = "1.0.0"/' \
            -e 's/widget-1.1.0-py3-none-any.whl/widget-1.0.0-py3-none-any.whl/' \
            -e 's|sha256:5b9866d1a5e11d85e37f88de9a941f9349ed18f4cd46508b12b1603d2ad63e2b|sha256:86eaa2517187b884e706a792085ed6dabd2530e6f37d0d9220d08b5448c8a796|' \
            "$work/bunpy.lock"
          out="$( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" update --no-install )"
          echo "$out"
          case "$out" in
            *"widget 1.0.0 -> 1.1.0"*) ;;
            *) echo "want widget upgrade line, got: $out"; exit 1 ;;
          esac
          grep -q 'version = "1.1.0"' "$work/bunpy.lock"

      - name: bunpy update --latest smoke (v0.1.7)
        shell: bash
        run: |
          work="$(mktemp -d)"
          cache="$(mktemp -d)"
          # Pin spec to ==1.0.0; bare update must respect it. --latest widget
          # strips the spec and lifts the pin to 1.1.0.
          cat > "$work/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"
          dependencies = ["widget==1.0.0"]
          EOF
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" pm lock )
          grep -q 'version = "1.0.0"' "$work/bunpy.lock"
          bare="$( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" update --no-install )"
          case "$bare" in
            *"no changes"*) ;;
            *) echo "want no-changes line for ==1.0.0 spec, got: $bare"; exit 1 ;;
          esac
          ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" update --latest widget --no-install )
          grep -q 'version = "1.1.0"' "$work/bunpy.lock"
          # --latest with no positional must error out.
          if ( cd "$work" && BUNPY_PYPI_FIXTURES="$GITHUB_WORKSPACE/tests/fixtures/v013/index" \
              BUNPY_CACHE_DIR="$cache" "$GITHUB_WORKSPACE/bunpy" update --latest --no-install 2>/dev/null ); then
            echo "want non-zero exit on --latest with no pkg"; exit 1
          fi

      - name: bunpy hello.py
        run: |
          echo 'x = 1' > hello.py
          ./bunpy hello.py
