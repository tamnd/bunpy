name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'

jobs:
  test:
    name: go test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Print tool versions
        run: go version

      - name: Sync sibling toolchain (gopapy, gocopy, goipy)
        shell: bash
        run: bash scripts/sync-deps.sh

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

      - name: stdlib index in sync with goipy
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tmp="$(mktemp)"
          bash scripts/sync-stdlib-index.sh "$tmp"
          if ! diff -u runtime/stdlib_index.go "$tmp"; then
            echo "runtime/stdlib_index.go is stale; run scripts/sync-stdlib-index.sh and commit." >&2
            exit 1
          fi

      - name: render-formula smoke
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/test-render-formula.sh

      - name: install.sh smoke
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/test-install-sh.sh

      - name: end-to-end fixtures
        shell: bash
        run: bash tests/run.sh

  smoke:
    name: bunpy --version smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Sync sibling toolchain (gopapy, gocopy, goipy)
        run: bash scripts/sync-deps.sh

      - name: Build bunpy with metadata
        env:
          BUNPY_VERSION: dev
        run: |
          go build \
            -trimpath \
            -ldflags="$(bash scripts/build-ldflags.sh)" \
            -o bunpy \
            ./cmd/bunpy

      - name: bunpy --version
        run: ./bunpy --version

      - name: bunpy version --short
        run: |
          got="$(./bunpy version --short)"
          test "$got" = "dev" || { echo "want dev, got $got"; exit 1; }

      - name: bunpy version --json shape
        run: |
          out="$(./bunpy version --json)"
          echo "$out"
          python3 -c "import json,sys; d=json.loads(sys.argv[1]); assert d['version']=='dev', d; assert d['commit'], d; assert d['build_date'], d; assert d['goipy'] and d['gocopy'] and d['gopapy'], d; assert 'go' in d and 'os' in d and 'arch' in d, d" "$out"

      - name: bunpy --help
        run: ./bunpy --help

      - name: bunpy help / --help parity
        shell: bash
        run: |
          for cmd in run repl stdlib version help man pm; do
            a="$(./bunpy help "$cmd")"
            b="$(./bunpy "$cmd" --help)"
            if [ "$a" != "$b" ]; then
              echo "help drift for $cmd"
              diff <(printf '%s' "$a") <(printf '%s' "$b") || true
              exit 1
            fi
          done

      - name: bunpy man render
        shell: bash
        run: |
          out="$(./bunpy man run)"
          case "$out" in
            .TH*) ;;
            *) echo "expected .TH header, got: ${out%%$'\n'*}"; exit 1 ;;
          esac

      - name: bunpy man --install smoke
        shell: bash
        run: |
          dest="$(mktemp -d)/share/man"
          ./bunpy man --install "$dest"
          test -f "$dest/man1/bunpy.1"
          test -f "$dest/man1/bunpy-run.1"
          test -f "$dest/man1/bunpy-repl.1"

      - name: bunpy repl piped smoke
        shell: bash
        run: |
          out="$(printf 'x = 1\n\n:quit\n' | ./bunpy repl --quiet 2>&1)"
          if [ -n "$out" ]; then
            echo "expected empty output, got: $out"; exit 1
          fi
          banner="$(printf ':quit\n' | ./bunpy repl 2>&1)"
          case "$banner" in
            *bunpy*repl*) ;;
            *) echo "expected banner, got: $banner"; exit 1 ;;
          esac

      - name: bunpy pm config smoke
        shell: bash
        run: |
          dir="$(mktemp -d)"
          cat > "$dir/pyproject.toml" <<'EOF'
          [project]
          name = "smoke"
          version = "0.0.1"

          [tool.bunpy]
          profile = "fast"
          EOF
          out="$(./bunpy pm config "$dir/pyproject.toml")"
          echo "$out"
          case "$out" in
            *smoke*0.0.1*) ;;
            *) echo "want smoke + 0.0.1, got: $out"; exit 1 ;;
          esac
          case "$out" in
            *fast*) ;;
            *) echo "want tool.bunpy.profile=fast, got: $out"; exit 1 ;;
          esac
          if ./bunpy pm config /no/such/path/pyproject.toml 2>/dev/null; then
            echo "want non-zero exit on missing file"; exit 1
          fi

      - name: bunpy pm info smoke
        shell: bash
        run: |
          fix="$(mktemp -d)/fixtures"
          mkdir -p "$fix/pypi.org/simple/demo"
          cat > "$fix/pypi.org/simple/demo/index.json" <<'EOF'
          {"name":"demo","files":[{"filename":"demo-1.0-py3-none-any.whl","url":"https://x/demo-1.0-py3-none-any.whl","hashes":{"sha256":"abc"}}],"meta":{"api-version":"1.1"}}
          EOF
          out="$(BUNPY_PYPI_FIXTURES="$fix" BUNPY_CACHE_DIR="$(mktemp -d)" ./bunpy pm info demo)"
          echo "$out"
          case "$out" in
            *demo*1.0*wheel*) ;;
            *) echo "want demo + 1.0 + wheel, got: $out"; exit 1 ;;
          esac
          if BUNPY_PYPI_FIXTURES="$fix" BUNPY_CACHE_DIR="$(mktemp -d)" ./bunpy pm info nopkg-xyzzy 2>/dev/null; then
            echo "want non-zero exit on 404"; exit 1
          fi

      - name: bunpy hello.py
        run: |
          echo 'x = 1' > hello.py
          ./bunpy hello.py
