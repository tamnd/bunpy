baseURL: "https://tamnd.github.io/bunpy/"
languageCode: "en-US"
title: "bunpy"
enableRobotsTXT: true
enableGitInfo: false

module:
  imports:
    - path: github.com/imfing/hextra

params:
  description: "An all-in-one Python toolkit. Runtime, package manager, bundler, test runner, and formatter in one fast static binary."
  navbar:
    displayTitle: true
    displayLogo: false
    search:
      enable: true
  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false
    copyright: "© 2024 bunpy contributors"
  theme:
    default: light
    displayToggle: true
  editURL:
    enable: false
  page:
    breadcrumb: true
  highlight:
    copy:
      enable: true

menu:
  main:
    - name: "Docs"
      pageRef: /docs
      weight: 1
    - name: "API"
      pageRef: /docs/api
      weight: 2
    - name: "Guides"
      pageRef: /guides
      weight: 3
    - name: "Blog"
      pageRef: /blog
      weight: 4
    - name: "GitHub"
      url: "https://github.com/tamnd/bunpy"
      weight: 5
      params:
        icon: github

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

outputs:
  home: [HTML, RSS, JSON]
  section: [HTML, RSS]
