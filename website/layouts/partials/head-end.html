{{/* OG / Twitter card meta tags */}}
<meta property="og:site_name" content="bunpy" />
<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}" />
<meta property="og:title" content="{{ if .IsHome }}bunpy — the Python runtime, package manager, and bundler{{ else }}{{ .Title }} — bunpy{{ end }}" />
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.description }}{{ . }}{{ end }}{{ end }}" />
<meta property="og:url" content="{{ .Permalink }}" />
<meta property="og:image" content="{{ .Site.BaseURL }}og-image.png" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{ if .IsHome }}bunpy{{ else }}{{ .Title }} — bunpy{{ end }}" />
<meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.description }}{{ . }}{{ end }}{{ end }}" />
<meta name="twitter:image" content="{{ .Site.BaseURL }}og-image.png" />
{{/* Favicon */}}
<link rel="icon" type="image/png" href="{{ .Site.BaseURL }}favicon.png" />
<link rel="apple-touch-icon" href="{{ .Site.BaseURL }}apple-touch-icon.png" />
