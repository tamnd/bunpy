name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'

jobs:
  cross:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            bin: bunpy
          - goos: linux
            goarch: arm64
            bin: bunpy
          - goos: darwin
            goarch: amd64
            bin: bunpy
          - goos: darwin
            goarch: arm64
            bin: bunpy
          - goos: windows
            goarch: amd64
            bin: bunpy.exe
          - goos: windows
            goarch: arm64
            bin: bunpy.exe
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Resolve version label
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "BUNPY_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "BUNPY_VERSION=dev" >> "$GITHUB_ENV"
          fi

      - name: go build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build \
            -trimpath \
            -ldflags="$(bash scripts/build-ldflags.sh)" \
            -o "${{ matrix.bin }}" \
            ./cmd/bunpy

      - name: Verify binary exists
        run: ls -la "${{ matrix.bin }}"

      - uses: actions/upload-artifact@v7
        with:
          name: bunpy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ matrix.bin }}
          if-no-files-found: error
          retention-days: 14
