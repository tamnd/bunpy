name: release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  GO_VERSION: '1.26'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            bin: bunpy
            archive: tar.gz
          - goos: linux
            goarch: arm64
            bin: bunpy
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            bin: bunpy
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            bin: bunpy
            archive: tar.gz
          - goos: windows
            goarch: amd64
            bin: bunpy.exe
            archive: zip
          - goos: windows
            goarch: arm64
            bin: bunpy.exe
            archive: zip
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Sync sibling toolchain (gopapy, gocopy, goipy)
        run: bash scripts/sync-deps.sh

      - name: Compute build metadata
        id: meta
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w \
              -X main.version=${{ steps.meta.outputs.version }} \
              -X main.commit=${{ steps.meta.outputs.commit }} \
              -X main.buildDate=${{ steps.meta.outputs.date }}" \
            -o "${{ matrix.bin }}" \
            ./cmd/bunpy

      - name: Stage archive contents
        run: |
          stage=bunpy-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          mkdir -p "$stage"
          cp "${{ matrix.bin }}" "$stage/"
          cp LICENSE README.md CHANGELOG.md "$stage/"
          echo "STAGE=$stage" >> "$GITHUB_ENV"

      - name: Create tarball
        if: matrix.archive == 'tar.gz'
        run: |
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - name: Create zip
        if: matrix.archive == 'zip'
        run: |
          zip -r "${STAGE}.zip" "$STAGE"
          sha256sum "${STAGE}.zip" > "${STAGE}.zip.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: archive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            bunpy-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
            bunpy-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: archive-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Aggregate checksums
        run: |
          ( cd dist && cat *.sha256 ) > dist/SHA256SUMS
          ls -la dist/

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
          body_path: changelog/${{ github.ref_name }}.md
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
